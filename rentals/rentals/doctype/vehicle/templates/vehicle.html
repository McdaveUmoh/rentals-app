{% extends "templates/web.html" %}

{% block page_content %}
    <h1>{{ title |e }}</h1>
    <h2> {{doc.color}} </h2>

    {% if doc.vehicle_image %}
        <img src="{{doc.vehicle_image}}" />
    {% else %}
        <span>This image has no picture.</span>
    {% endif %}

    <br/> <br/>
    <a class="btn btn-info" href="/book-a-ride/new/?vehicle={{doc.name}}"> Book Ride</a>
{% endblock %}

<!-- this is a sample default web page template -->
